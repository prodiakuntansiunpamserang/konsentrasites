<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tes Peminatan Akuntansi UNPAM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
    animation:fadeIn .5s ease;
}

.hidden{
    display:none;
}

h1,h2{
    margin-bottom:15px;
}

p{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

button{
    padding:14px 20px;
    border:none;
    border-radius:10px;
    background:#facc15;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.choices{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

#timer{
    font-size:24px;
    font-weight:bold;
    color:#facc15;
}

.question{
    background:rgba(255,255,255,0.05);
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

.question p{
    margin-bottom:10px;
}

.submit-btn{
    width:100%;
}

.result-buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
}

#scoreText{
    font-size:24px;
    font-weight:bold;
}

#statusText{
    font-size:20px;
    margin-top:10px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>
<body>

<div class="container">

    <!-- LOGIN -->
    <div id="loginPage" class="card">
        <h1>TES PEMINATAN</h1>
        <p>Program Studi Akuntansi UNPAM Serang</p>

        <input type="text" id="nim" placeholder="Masukkan NIM">
        <input type="password" id="password" placeholder="Masukkan Password">

        <button onclick="login()">Masuk</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="card hidden">
        <h2>Pilih Konsentrasi</h2>

        <div class="choices">
            <button onclick="startTest('keuangan')">Keuangan</button>
            <button onclick="startTest('audit')">Audit</button>
            <button onclick="startTest('pajak')">Pajak</button>
        </div>
    </div>

    <!-- TEST -->
    <div id="testPage" class="card hidden">
        <div class="top-bar">
            <h2 id="testTitle"></h2>
            <div id="timer">05:00</div>
        </div>

        <div id="questionBox"></div>

        <button class="submit-btn" onclick="submitTest()">Submit Jawaban</button>
    </div>

    <!-- RESULT -->
    <div id="resultPage" class="card hidden">
        <h2>Hasil Tes</h2>

        <p id="scoreText"></p>
        <p id="statusText"></p>

        <div class="result-buttons">
            <button onclick="retryTest()">Tes Ulang</button>
            <button onclick="backDashboard()">Dashboard</button>
        </div>
    </div>

</div>

<script>

let currentQuestions = [];
let timer;
let timeLeft = 300;

                C:"Menentukan besarnya laba perusahaan",
                D:"Menghitung pajak perusahaan"
            },
            answer:"B"
        },
        {
            question:"Pihak yang bertanggung jawab atas penyusunan laporan keuangan adalah ....",
            options:{
                A:"Auditor independen",
                B:"Pemerintah",
                C:"Manajemen perusahaan",
                D:"Investor"
            },
            answer:"C"
        },
        {
            question:"Sikap mental auditor agar hasil audit dipercaya disebut ....",
            options:{
                A:"Materialitas",
                B:"Independensi",
                C:"Efisiensi",
                D:"Objektivitas"
            },
            answer:"B"
        },
        {
            question:"Bukti audit melalui pengamatan fisik persediaan termasuk ....",
            options:{
                A:"Bukti dokumenter",

                C:"Bukti fisik",
                D:"Bukti lisan"

            answer:"A"

        {
            question:"Pengendalian internal bertujuan untuk ....",
            options:{
                A:"Menghilangkan seluruh risiko",
                B:"Menjamin selalu laba",
                C:"Memberikan keyakinan memadai",
                D:"Menggantikan auditor"
            },
            answer:"C"
        },
        {
            question:"Risiko auditor memberi opini wajar padahal ada salah saji adalah ....",
            options:{
                A:"Risiko bisnis",
                B:"Risiko pengendalian",
                C:"Risiko inheren",
                D:"Risiko audit"
            },
            answer:"D"
        },
        {
            question:"Materialitas dalam audit mengacu pada ....",
            options:{
                A:"Jumlah transaksi besar",
                B:"Tingkat kesalahan yang memengaruhi keputusan",

                A:"Inspeksi",

            answer:"C"
        },

            question:"Surat konfirmasi piutang menguji asersi ....",
            options:{
                A:"Kelengkapan",

        {

        },

                A:"Penggajian",
                B:"Perdagangan barang tertentu",

    keuangan: [
        {
            question:"Urutan siklus akuntansi yang benar adalah ....",

                E:"Rp60.000.000"
            },

            options:{
                A:"Rp19.700.000",
                B:"Rp20.500.000",
                C:"Rp20.700.000",
                D:"Rp20.900.000",
                E:"Rp21.200.000"
            },
            answer:"D"
        },
        {
            question:"HPP metode FIFO adalah ....",
            options:{
                A:"Rp1.500.000",
                B:"Rp1.600.000",
                C:"Rp1.700.000",
                D:"Rp1.800.000",
                E:"Rp1.900.000"
            },
            answer:"B"
        },
        {
            question:"Jurnal penurunan nilai aset adalah ....",
            options:{
                A:"Kerugian Penurunan Nilai (D), Akumulasi Penurunan Nilai (K)",
                B:"Akumulasi Penyusutan (D), Mesin (K)",
                C:"Kas (D), Kerugian Penurunan Nilai (K)",
                D:"Mesin (D), Kerugian Penurunan Nilai (K)",
                E:"Beban Penyusutan (D), Akumulasi Penyusutan (K)"
            },
            answer:"C"
        }
    ]
};

function login(){
    let nim = document.getElementById("nim").value.trim();
    let password = document.getElementById("password").value.trim();

    if(nim === "" || password === ""){
        alert("Isi NIM dan Password!");
        return;
    }

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
}

function startTest(category){
    currentCategory = category;
    currentQuestions = questionBank[category];

    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("testPage").classList.remove("hidden");

    document.getElementById("testTitle").innerText =
        "Tes " + category.toUpperCase();

    renderQuestions();
    startTimer();
}

function renderQuestions(){
    let box = document.getElementById("questionBox");
    box.innerHTML = "";

    currentQuestions.forEach((q,index)=>{
        let optionsHTML = "";

        q.options.forEach(opt=>{
            optionsHTML += `
            <label>
                <input type="radio" name="q${index}" value="${opt}">
                ${opt}
            </label><br>
            `;
        });

        box.innerHTML += `
            <div class="question">
                <p>${index+1}. ${q.question}</p>
                ${optionsHTML}
            </div>
        `;
    });
}

function startTimer(){
    clearInterval(timer);
    timeLeft = 300;

    timer = setInterval(()=>{
        let min = Math.floor(timeLeft/60);
        let sec = timeLeft%60;

        document.getElementById("timer").innerText =
            `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

        timeLeft--;

        if(timeLeft < 0){
            submitTest();
        }
    },1000);
}

function submitTest(){
    clearInterval(timer);

    let score = 0;

    currentQuestions.forEach((q,index)=>{
        let selected = document.querySelector(`input[name="q${index}"]:checked`);

        if(selected && selected.value === q.answer){
            score += 10;
        }
    });

    document.getElementById("testPage").classList.add("hidden");
    document.getElementById("resultPage").classList.remove("hidden");

    document.getElementById("scoreText").innerText =
        "Nilai Anda: " + score;

    if(score >= 80){
        document.getElementById("statusText").innerText =
        "LULUS - Selamat, Anda lolos konsentrasi ini.";
    }else{
        document.getElementById("statusText").innerText =
        "TIDAK LULUS - Wajib Tes Ulang.";
    }
}

function retryTest(){
    document.getElementById("resultPage").classList.add("hidden");
    startTest(currentCategory);
}

function backDashboard(){
    document.getElementById("resultPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
}
</script>

</body>
</html>
