<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tes Peminatan Akuntansi UNPAM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
    animation:fadeIn .5s ease;
}

.hidden{
    display:none;
}

h1,h2{
    margin-bottom:15px;
}

p{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

button{
    padding:14px 20px;
    border:none;
    border-radius:10px;
    background:#facc15;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.choices{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

#timer{
    font-size:24px;
    font-weight:bold;
    color:#facc15;
}

.question{
    background:rgba(255,255,255,0.05);
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

.question p{
    margin-bottom:10px;
}

.submit-btn{
    width:100%;
}

.result-buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
}

#scoreText{
    font-size:24px;
    font-weight:bold;
}

#statusText{
    font-size:20px;
    margin-top:10px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>
<body>

<div class="container">

    <!-- LOGIN -->
    <div id="loginPage" class="card">
        <h1>TES PEMINATAN</h1>
        <p>Program Studi Akuntansi UNPAM Serang</p>

        <input type="text" id="nim" placeholder="Masukkan NIM">
        <input type="password" id="password" placeholder="Masukkan Password">

        <button onclick="login()">Masuk</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="card hidden">
        <h2>Pilih Konsentrasi</h2>

        <div class="choices">
            <button onclick="startTest('keuangan')">Keuangan</button>
            <button onclick="startTest('audit')">Audit</button>
            <button onclick="startTest('pajak')">Pajak</button>
        </div>
    </div>

    <!-- TEST -->
    <div id="testPage" class="card hidden">
        <div class="top-bar">
            <h2 id="testTitle"></h2>
            <div id="timer">05:00</div>
        </div>

        <div id="questionBox"></div>

        <button class="submit-btn" onclick="submitTest()">Submit Jawaban</button>
    </div>

    <!-- RESULT -->
    <div id="resultPage" class="card hidden">
        <h2>Hasil Tes</h2>

        <p id="scoreText"></p>
        <p id="statusText"></p>

        <div class="result-buttons">
            <button onclick="retryTest()">Tes Ulang</button>
            <button onclick="backDashboard()">Dashboard</button>
        </div>
    </div>

</div>

<script>
let currentCategory = "";
let currentQuestions = [];
let timer;
let timeLeft = 300;

const questionBank = {
    keuangan: [
        {
            question: "Urutan siklus akuntansi yang benar adalah ....",
            options: ["A", "B", "C", "D", "E"],
            answer: "C"
        },
        {
            question: "Perusahaan menerima kas dari pelanggan Rp5.000.000. Jurnal yang benar adalah ....",
            options: ["A", "B", "C", "D", "E"],
            answer: "A"
        },
        { question: "Fungsi utama rekonsiliasi bank adalah ....", options: ["A","B","C","D","E"], answer: "B" },
        { question: "Beban perlengkapan yang diakui adalah ....", options: ["A","B","C","D","E"], answer: "C" },
        { question: "Jumlah pengisian kembali kas kecil adalah ....", options: ["A","B","C","D","E"], answer: "C" },
        { question: "Penyusutan per tahun metode garis lurus adalah ....", options: ["A","B","C","D","E"], answer: "C" },
        { question: "Jumlah saldo debit neraca saldo adalah ....", options: ["A","B","C","D","E"], answer: "C" },
        { question: "Saldo kas benar setelah rekonsiliasi adalah ....", options: ["A","B","C","D","E"], answer: "D" },
        { question: "HPP metode FIFO adalah ....", options: ["A","B","C","D","E"], answer: "B" },
        { question: "Jurnal penurunan nilai aset adalah ....", options: ["A","B","C","D","E"], answer: "C" }
    ],

    audit: [
        { question:"Tujuan utama audit laporan keuangan adalah ....", options:["A","B","C","D"], answer:"B" },
        { question:"Pihak yang bertanggung jawab atas penyusunan laporan keuangan adalah ....", options:["A","B","C","D"], answer:"C" },
        { question:"Sikap mental auditor disebut ....", options:["A","B","C","D"], answer:"B" },
        { question:"Pengamatan fisik persediaan termasuk ....", options:["A","B","C","D"], answer:"C" },
        { question:"Asersi seluruh transaksi tercatat disebut ....", options:["A","B","C","D"], answer:"A" },
        { question:"Tujuan pengendalian internal adalah ....", options:["A","B","C","D"], answer:"C" },
        { question:"Risiko auditor memberi opini wajar padahal salah saji disebut ....", options:["A","B","C","D"], answer:"D" },
        { question:"Materialitas mengacu pada ....", options:["A","B","C","D"], answer:"B" },
        { question:"Membandingkan data antarperiode disebut ....", options:["A","B","C","D"], answer:"C" },
        { question:"Konfirmasi piutang menguji asersi ....", options:["A","B","C","D"], answer:"C" }
    ],

    pajak: [
        { question:"Yang termasuk subjek PPh adalah ....", options:["A","B","C","D","E"], answer:"A" },
        { question:"PPh Pasal 21 dikenakan atas ....", options:["A","B","C","D","E"], answer:"B" },
        { question:"Penghasilan pegawai tetap setiap bulan disebut ....", options:["A","B","C","D","E"], answer:"C" },
        { question:"Gaji Rp8.000.000 per bulan termasuk objek ....", options:["A","B","C","D","E"], answer:"C" },
        { question:"PPh Pasal 22 berkaitan dengan ....", options:["A","B","C","D","E"], answer:"B" },
        { question:"Pajak jasa konsultan dipotong dengan ....", options:["A","B","C","D","E"], answer:"C" },
        { question:"Bonus pegawai dalam PPh 21 termasuk ....", options:["A","B","C","D","E"], answer:"B" },
        { question:"Pajak luar negeri dikreditkan melalui ....", options:["A","B","C","D","E"], answer:"D" },
        { question:"Angsuran pajak bulanan diatur dalam ....", options:["A","B","C","D","E"], answer:"E" },
        { question:"Pajak final persewaan tanah termasuk ....", options:["A","B","C","D","E"], answer:"A" }
    ]
};

function login(){
    let nim = document.getElementById("nim").value.trim();
    let password = document.getElementById("password").value.trim();

    if(nim === "" || password === ""){
        alert("Isi NIM dan Password!");
        return;
    }

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
}

function startTest(category){
    currentCategory = category;
    currentQuestions = questionBank[category];

    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("testPage").classList.remove("hidden");

    document.getElementById("testTitle").innerText =
        "Tes " + category.toUpperCase();

    renderQuestions();
    startTimer();
}

function renderQuestions(){
    let box = document.getElementById("questionBox");
    box.innerHTML = "";

    currentQuestions.forEach((q,index)=>{
        let optionsHTML = "";

        q.options.forEach(opt=>{
            optionsHTML += `
            <label>
                <input type="radio" name="q${index}" value="${opt}">
                ${opt}
            </label><br>
            `;
        });

        box.innerHTML += `
            <div class="question">
                <p>${index+1}. ${q.question}</p>
                ${optionsHTML}
            </div>
        `;
    });
}

function startTimer(){
    clearInterval(timer);
    timeLeft = 300;

    timer = setInterval(()=>{
        let min = Math.floor(timeLeft/60);
        let sec = timeLeft%60;

        document.getElementById("timer").innerText =
            `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

        timeLeft--;

        if(timeLeft < 0){
            submitTest();
        }
    },1000);
}

function submitTest(){
    clearInterval(timer);

    let score = 0;

    currentQuestions.forEach((q,index)=>{
        let selected = document.querySelector(`input[name="q${index}"]:checked`);

        if(selected && selected.value === q.answer){
            score += 10;
        }
    });

    document.getElementById("testPage").classList.add("hidden");
    document.getElementById("resultPage").classList.remove("hidden");

    document.getElementById("scoreText").innerText =
        "Nilai Anda: " + score;

    if(score >= 80){
        document.getElementById("statusText").innerText =
        "LULUS - Selamat, Anda lolos konsentrasi ini.";
    }else{
        document.getElementById("statusText").innerText =
        "TIDAK LULUS - Wajib Tes Ulang.";
    }
}

function retryTest(){
    document.getElementById("resultPage").classList.add("hidden");
    startTest(currentCategory);
}

function backDashboard(){
    document.getElementById("resultPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
}
</script>

</body>
</html>
