<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tes Peminatan Akuntansi UNPAM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
    animation:fadeIn .5s ease;
}

.hidden{
    display:none;
}

h1,h2{
    margin-bottom:15px;
}

p{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

button{
    padding:14px 20px;
    border:none;
    border-radius:10px;
    background:#facc15;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.choices{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

#timer{
    font-size:24px;
    font-weight:bold;
    color:#facc15;
}

.question{
    background:rgba(255,255,255,0.05);
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

.question p{
    margin-bottom:10px;
}

.submit-btn{
    width:100%;
}

.result-buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
}

#scoreText{
    font-size:24px;
    font-weight:bold;
}

#statusText{
    font-size:20px;
    margin-top:10px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>
<body>

<div class="container">

    <!-- LOGIN -->
    <div id="loginPage" class="card">
        <h1>TES PEMINATAN</h1>
        <p>Program Studi Akuntansi UNPAM Serang</p>

        <input type="text" id="nim" placeholder="Masukkan NIM">
        <input type="password" id="password" placeholder="Masukkan Password">

        <button onclick="login()">Masuk</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="card hidden">
        <h2>Pilih Konsentrasi</h2>

        <div class="choices">
            <button onclick="startTest('keuangan')">Keuangan</button>
            <button onclick="startTest('audit')">Audit</button>
            <button onclick="startTest('pajak')">Pajak</button>
        </div>
    </div>

    <!-- TEST -->
    <div id="testPage" class="card hidden">
        <div class="top-bar">
            <h2 id="testTitle"></h2>
            <div id="timer">05:00</div>
        </div>

        <div id="questionBox"></div>

        <button class="submit-btn" onclick="submitTest()">Submit Jawaban</button>
    </div>

    <!-- RESULT -->
    <div id="resultPage" class="card hidden">
        <h2>Hasil Tes</h2>

        <p id="scoreText"></p>
        <p id="statusText"></p>

        <div class="result-buttons">
            <button onclick="retryTest()">Tes Ulang</button>
            <button onclick="backDashboard()">Dashboard</button>
        </div>
    </div>

</div>

<script>
let currentCategory = "";
let currentQuestions = [];
let timer;
let timeLeft = 300;

const questionBank = {
    keuangan: [
        "Apa fungsi laporan arus kas?",
        "Apa itu aset?",
        "Apa itu liabilitas?",
        "Apa itu ekuitas?",
        "Apa itu ROI?",
        "Apa itu BEP?",
        "Apa itu budgeting?",
        "Apa itu investasi?",
        "Apa itu dividen?",
        "Apa itu cash flow?"
    ],

    audit: [
        "Apa tujuan audit?",
        "Apa itu materialitas?",
        "Apa itu fraud?",
        "Apa itu SPI?",
        "Apa itu audit evidence?",
        "Apa itu independensi?",
        "Apa itu opini wajar?",
        "Apa itu audit planning?",
        "Apa itu risk audit?",
        "Apa itu sampling audit?"
    ],

    pajak: [
        "Apa itu PPN?",
        "Apa itu PPh?",
        "Apa itu NPWP?",
        "Apa itu PKP?",
        "Apa itu tax planning?",
        "Apa itu tax avoidance?",
        "Apa itu tax evasion?",
        "Apa itu restitusi?",
        "Apa itu SPT?",
        "Apa itu fiskus?"
    ]
};

function login(){
    const nim = document.getElementById("nim").value.trim();
    const password = document.getElementById("password").value.trim();

    if(nim === "" || password === ""){
        alert("Harap isi NIM dan Password!");
        return;
    }

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
}

function startTest(category){
    currentCategory = category;
    currentQuestions = questionBank[category];

    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("testPage").classList.remove("hidden");

    document.getElementById("testTitle").innerText =
        "Tes Konsentrasi " + category.toUpperCase();

    renderQuestions();
    startTimer();
}

function renderQuestions(){
    let box = document.getElementById("questionBox");
    box.innerHTML = "";

    currentQuestions.forEach((question,index)=>{
        box.innerHTML += `
            <div class="question">
                <p>${index+1}. ${question}</p>
                <input type="text" id="answer${index}" placeholder="Jawaban Anda">
            </div>
        `;
    });
}

function startTimer(){
    clearInterval(timer);
    timeLeft = 300;

    timer = setInterval(()=>{
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        document.getElementById("timer").innerText =
            `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;

        timeLeft--;

        if(timeLeft < 0){
            clearInterval(timer);
            submitTest();
        }
    },1000);
}

function submitTest(){
    clearInterval(timer);

    let answered = 0;

    currentQuestions.forEach((q,index)=>{
        let ans = document.getElementById(`answer${index}`).value.trim();

        if(ans !== ""){
            answered++;
        }
    });

    let score = answered * 10;

    document.getElementById("testPage").classList.add("hidden");
    document.getElementById("resultPage").classList.remove("hidden");

    document.getElementById("scoreText").innerText =
        "Nilai Anda: " + score;

    if(score >= 80){
        document.getElementById("statusText").innerText =
        "LULUS - Selamat, Anda berhak mengambil konsentrasi ini.";
    }else{
        document.getElementById("statusText").innerText =
        "TIDAK LULUS - Wajib Tes Ulang sampai nilai minimal 80.";
    }
}

function retryTest(){
    if(document.getElementById("statusText").innerText.includes("TIDAK")){
        document.getElementById("resultPage").classList.add("hidden");
        startTest(currentCategory);
    }
}

function backDashboard(){
    document.getElementById("resultPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
}
</script>

</body>
</html>
